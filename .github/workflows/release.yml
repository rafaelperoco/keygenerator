name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  GO_VERSION: "1.26.2"

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify module integrity
        run: |
          go mod download
          go mod verify

      - name: Run full test suite before release
        run: |
          go test -race -count=1 ./...

      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.18.1

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Install Trivy
        env:
          TRIVY_VERSION: 0.70.0
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C /tmp/ trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: present when the homebrew-tap publish secret has been
          # configured. Empty string when absent; goreleaser brew config
          # uses this to skip_upload so the release does not block on the
          # tap repo / token existing.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || '' }}

      # Gate: scan generated SBOMs against Trivy's CVE database. govulncheck
      # already ran as a CI gate against the source; this is a second opinion
      # against the actual artifact contents. CRITICAL/HIGH unfixed vulns
      # block the release.
      - name: Trivy SBOM scan (release gate)
        run: |
          set -euo pipefail
          shopt -s nullglob
          for sbom in dist/*.sbom.json; do
            echo "::group::Trivy scan $sbom"
            trivy sbom \
              --severity CRITICAL,HIGH \
              --exit-code 1 \
              --ignore-unfixed \
              "$sbom"
            echo "::endgroup::"
          done

      # Gate: scan the published container images for OS-level CVEs (libc,
      # ca-certificates, etc.) that govulncheck does not see. Distroless
      # minimizes this surface but does not eliminate it. We strip the
      # leading "v" from the tag to match goreleaser's image tag template
      # ({{ .Version }} is "2.0.0-alpha.7", not "v2.0.0-alpha.7").
      - name: Trivy container image scan (release gate)
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # GitHub gives us "v2.0.0-alpha.7" but goreleaser tags the
          # container as "2.0.0-alpha.7" via {{ .Version }}. Strip the
          # leading "v" to match.
          VERSION="${REF_NAME#v}"
          IMAGE="ghcr.io/${REPO_OWNER}/secretgenerator:${VERSION}"
          echo "scanning ${IMAGE}"
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            "${IMAGE}"

      # Generate one SARIF per architecture archive (we have 5: linux/darwin
      # × amd64/arm64 plus windows/amd64) and merge them into a single
      # report. GitHub Code Scanning rejects multiple SARIF runs uploaded
      # under the same category, so we upload only the merged report.
      # Reference: https://github.blog/changelog/2025-07-21-code-scanning-will-stop-combining-multiple-sarif-runs-uploaded-in-the-same-sarif-file/
      - name: Generate consolidated Trivy SARIF report
        if: success()
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Pick a single representative SBOM (linux/amd64) — all archive
          # SBOMs come from the same module graph, so the CVE list is
          # identical across them. Scanning one is sufficient.
          rep=$(ls dist/secretgenerator_*_linux_amd64.tar.gz.sbom.json 2>/dev/null | head -n1)
          if [ -z "${rep}" ]; then
            echo "no representative SBOM found, skipping SARIF generation"
            exit 0
          fi
          mkdir -p trivy-sarif
          trivy sbom --format sarif --output trivy-sarif/release.sarif "$rep"
          ls -la trivy-sarif/

      - name: Upload Trivy SARIF to Security tab
        if: success() && hashFiles('trivy-sarif/release.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sarif/release.sarif
          category: trivy-release

      # Always compute SLSA subjects when goreleaser succeeded, even if a
      # later cosmetic step (SARIF upload) failed. Provenance generation
      # is the load-bearing security artifact; we cannot let SARIF
      # upload cosmetics block it.
      - name: Compute artifact SHA-256 hashes for SLSA
        id: hashes
        # always() disarms the implicit "skip if any previous step failed"
        # behavior; combined with the outcome guard, this step runs only
        # when goreleaser actually produced artifacts, regardless of
        # whether the cosmetic SARIF upload succeeded.
        if: always() && steps.goreleaser.outcome == 'success'
        env:
          ARTIFACTS: '${{ steps.goreleaser.outputs.artifacts }}'
        run: |
          set -euo pipefail
          checksums=$(echo "$ARTIFACTS" | jq -r '[.[] | select(.type=="Archive" or .type=="Linux Package" or .type=="Source") | .path] | .[]')
          if [ -z "$checksums" ]; then
            echo "no archive artifacts to hash"
            exit 1
          fi
          hashes=$(sha256sum $checksums | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

  provenance:
    name: slsa-provenance
    needs: [release]
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: '${{ needs.release.outputs.hashes }}'
      upload-assets: true
