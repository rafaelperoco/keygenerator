name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.23"

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify module integrity
        run: |
          go mod download
          go mod verify

      - name: Run full test suite before release
        run: |
          go test -race -count=1 ./...

      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.18.1

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.58.0

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Gate: scan generated SBOMs against Trivy's CVE database. govulncheck
      # already ran as a CI gate against the source; this is a second opinion
      # against the actual artifact contents. CRITICAL/HIGH unfixed vulns
      # block the release.
      - name: Trivy SBOM scan (release gate)
        run: |
          set -euo pipefail
          shopt -s nullglob
          for sbom in dist/*.sbom.json; do
            echo "::group::Trivy scan $sbom"
            trivy sbom \
              --severity CRITICAL,HIGH \
              --exit-code 1 \
              --ignore-unfixed \
              "$sbom"
            echo "::endgroup::"
          done

      # Gate: scan the published container images for OS-level CVEs (libc,
      # ca-certificates, etc.) that govulncheck does not see. Distroless
      # minimizes this surface but does not eliminate it.
      - name: Trivy container image scan (release gate)
        env:
          IMAGE: 'ghcr.io/${{ github.repository_owner }}/keygenerator:${{ github.ref_name }}'
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            "$IMAGE"

      - name: Trivy SARIF upload (Security tab)
        if: always()
        run: |
          set -euo pipefail
          shopt -s nullglob
          for sbom in dist/*.sbom.json; do
            base=$(basename "$sbom")
            trivy sbom --format sarif --output "trivy-${base}.sarif" "$sbom" || true
          done

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./
          category: trivy-release

      - name: Compute artifact SHA-256 hashes for SLSA
        id: hashes
        env:
          ARTIFACTS: '${{ steps.goreleaser.outputs.artifacts }}'
        run: |
          set -euo pipefail
          checksums=$(echo "$ARTIFACTS" | jq -r '[.[] | select(.type=="Archive" or .type=="Linux Package" or .type=="Source") | .path] | .[]')
          if [ -z "$checksums" ]; then
            echo "no archive artifacts to hash"
            exit 1
          fi
          hashes=$(sha256sum $checksums | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

  provenance:
    name: slsa-provenance
    needs: [release]
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: '${{ needs.release.outputs.hashes }}'
      upload-assets: true
