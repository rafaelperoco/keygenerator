name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  GO_VERSION: "1.26.2"

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify module integrity
        run: |
          go mod download
          go mod verify

      - name: Run full test suite before release
        run: |
          go test -race -count=1 ./...

      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.18.1

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: v2.4.1

      - name: Install Trivy
        env:
          TRIVY_VERSION: 0.70.0
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C /tmp/ trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: present when the homebrew-tap publish secret has been
          # configured. Empty string when absent; goreleaser brew config
          # uses this to skip_upload so the release does not block on the
          # tap repo / token existing.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || '' }}

      # Gate: scan generated SBOMs against Trivy's CVE database. govulncheck
      # already ran as a CI gate against the source; this is a second opinion
      # against the actual artifact contents. CRITICAL/HIGH unfixed vulns
      # block the release.
      - name: Trivy SBOM scan (release gate)
        run: |
          set -euo pipefail
          shopt -s nullglob
          for sbom in dist/*.sbom.json; do
            echo "::group::Trivy scan $sbom"
            trivy sbom \
              --severity CRITICAL,HIGH \
              --exit-code 1 \
              --ignore-unfixed \
              "$sbom"
            echo "::endgroup::"
          done

      # Gate: scan the published container images for OS-level CVEs (libc,
      # ca-certificates, etc.) that govulncheck does not see. Distroless
      # minimizes this surface but does not eliminate it. We strip the
      # leading "v" from the tag to match goreleaser's image tag template
      # ({{ .Version }} is "2.0.0-alpha.7", not "v2.0.0-alpha.7").
      - name: Trivy container image scan (release gate)
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # GitHub gives us "v2.0.0-alpha.7" but goreleaser tags the
          # container as "2.0.0-alpha.7" via {{ .Version }}. Strip the
          # leading "v" to match.
          VERSION="${REF_NAME#v}"
          IMAGE="ghcr.io/${REPO_OWNER}/secretgenerator:${VERSION}"
          echo "scanning ${IMAGE}"
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            "${IMAGE}"

      # Generate one SARIF per architecture archive (we have 5: linux/darwin
      # × amd64/arm64 plus windows/amd64) and merge them into a single
      # report. GitHub Code Scanning rejects multiple SARIF runs uploaded
      # under the same category, so we upload only the merged report.
      # Reference: https://github.blog/changelog/2025-07-21-code-scanning-will-stop-combining-multiple-sarif-runs-uploaded-in-the-same-sarif-file/
      - name: Generate consolidated Trivy SARIF report
        if: success()
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Pick a single representative SBOM (linux/amd64) — all archive
          # SBOMs come from the same module graph, so the CVE list is
          # identical across them. Scanning one is sufficient.
          rep=$(ls dist/secretgenerator_*_linux_amd64.tar.gz.sbom.json 2>/dev/null | head -n1)
          if [ -z "${rep}" ]; then
            echo "no representative SBOM found, skipping SARIF generation"
            exit 0
          fi
          mkdir -p trivy-sarif
          trivy sbom --format sarif --output trivy-sarif/release.sarif "$rep"
          ls -la trivy-sarif/

      - name: Upload Trivy SARIF to Security tab
        if: success() && hashFiles('trivy-sarif/release.sarif') != ''
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: trivy-sarif/release.sarif
          category: trivy-release

      # Always compute SLSA subjects when goreleaser succeeded, even if a
      # later cosmetic step (SARIF upload) failed. Provenance generation
      # is the load-bearing security artifact; we cannot let SARIF
      # upload cosmetics block it.
      - name: Compute artifact SHA-256 hashes for SLSA
        id: hashes
        # always() disarms the implicit "skip if any previous step failed"
        # behavior; combined with the outcome guard, this step runs only
        # when goreleaser actually produced artifacts, regardless of
        # whether the cosmetic SARIF upload succeeded.
        if: always() && steps.goreleaser.outcome == 'success'
        env:
          ARTIFACTS: '${{ steps.goreleaser.outputs.artifacts }}'
        run: |
          set -euo pipefail
          checksums=$(echo "$ARTIFACTS" | jq -r '[.[] | select(.type=="Archive" or .type=="Linux Package" or .type=="Source") | .path] | .[]')
          if [ -z "$checksums" ]; then
            echo "no archive artifacts to hash"
            exit 1
          fi
          hashes=$(sha256sum $checksums | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

  provenance:
    name: slsa-provenance
    needs: [release]
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: '${{ needs.release.outputs.hashes }}'
      upload-assets: true

  # Publishes @secretgenerator/mcp to npm. The package version is synced
  # to the release tag (vX.Y.Z → X.Y.Z) so an installer running
  # `npx -y @secretgenerator/mcp@latest` always pairs with the matching
  # CLI binary. The job depends on `release` only because we want a
  # successful release before publishing — there is no artifact handoff;
  # the package builds its own WASM bundle from the same source tree.
  npm-publish-mcp:
    name: npm publish (mcp)
    needs: [release]
    runs-on: ubuntu-latest
    # The publish step itself reads NPM_TOKEN; if the secret is unset the
    # publish-to-npm step short-circuits with a clear message rather than
    # blocking the workflow. We do not gate the whole job on
    # `secrets.NPM_TOKEN != ''` because GitHub Actions discourages using
    # secrets in `if:` expressions (they would have to be evaluated by
    # the runner before the job is admitted).
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install TinyGo
        env:
          TINYGO_VERSION: "0.41.1"
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo${TINYGO_VERSION}.linux-amd64.tar.gz" \
            -o /tmp/tinygo.tgz
          sudo tar -xzf /tmp/tinygo.tgz -C /usr/local/
          echo "/usr/local/tinygo/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Sync package version to release tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install + build (compiles WASM and TS)
        run: npm ci && npm run build

      - name: Smoke before publish
        run: npm run smoke

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is not configured; skipping npm publish."
            echo "Set the NPM_TOKEN repository secret to enable automatic publish."
            exit 0
          fi
          # Pre-release tags (containing "-") publish under `next`; only
          # final releases get `latest`.
          if [[ "${REF_NAME}" == *-* ]]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi

  # Publishes @secretgenerator/cli to npm. Critical: this job MUST run
  # AFTER the release job because the cli's postinstall hook downloads
  # archives from the GitHub release that the release job creates.
  # Publishing earlier would break first-install for any user who
  # races the npm registry's CDN propagation.
  npm-publish-cli:
    name: npm publish (cli)
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Sync package version to release tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install + build
        run: npm ci && npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          # The cli package's postinstall would normally download from
          # the release we just published; we skip it during the publish
          # pipeline because the runner does not need the binary cached
          # locally and the download could race release artifact CDN
          # propagation.
          SECRETGENERATOR_SKIP_DOWNLOAD: "1"
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is not configured; skipping npm publish."
            echo "Set the NPM_TOKEN repository secret to enable automatic publish."
            exit 0
          fi
          if [[ "${REF_NAME}" == *-* ]]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi

  # Publishes the secretgenerator package to PyPI via trusted publishing
  # (OIDC, no API token). The first publish for a given project name
  # has to be done manually (see CONTRIBUTING.md); after that, configure
  # https://pypi.org/manage/project/secretgenerator-py/settings/publishing/
  # with workflow=release.yml and environment=pypi to authorize this job.
  pypi-publish:
    name: pypi publish
    needs: [release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/secretgenerator-py
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Sync package version to release tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          # PEP 440: pre-releases use the form "2.0.0a1" or "2.0.0b2",
          # not "2.0.0-alpha.1". Translate the goreleaser/semver form.
          PEP440=$(echo "$VERSION" \
            | sed -E 's/-alpha\.([0-9]+)/a\1/' \
            | sed -E 's/-beta\.([0-9]+)/b\1/' \
            | sed -E 's/-rc\.([0-9]+)/rc\1/')
          python -c "import re,pathlib; p=pathlib.Path('pyproject.toml'); t=p.read_text(); t=re.sub(r'^version = \"[^\"]+\"', f'version = \"$PEP440\"', t, count=1, flags=re.M); p.write_text(t)"
          grep '^version =' pyproject.toml

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: python/dist/

  # Publishes the secretgenerator crate to crates.io. Requires
  # CRATES_TOKEN (a crates.io API token with publish-update scope) to
  # be configured as a repository secret. The first publish must be
  # done manually with `cargo publish` to reserve the name; subsequent
  # publishes ride this job.
  crates-publish:
    name: crates publish
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rust-crate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Sync crate version to release tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          python3 -c "import re,pathlib; p=pathlib.Path('Cargo.toml'); t=p.read_text(); t=re.sub(r'^version = \"[^\"]+\"', f'version = \"$VERSION\"', t, count=1, flags=re.M); p.write_text(t)"
          grep '^version =' Cargo.toml

      - name: Verify build
        run: cargo build --verbose

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CRATES_TOKEN secret is not configured; skipping crates publish."
            echo "Generate one at https://crates.io/settings/tokens with publish-update scope."
            exit 0
          fi
          cargo publish --allow-dirty
